<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Glowing background blobs -->
    <div class="bg-glowing-spots"></div>

    <!-- Navigation Header -->
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">Rahul Chemitiganti</a>
            <button class="menu-toggle" aria-label="Toggle Navigation Menu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links-wrapper">
                <ul class="nav-links">
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="education.html"><i class="fas fa-graduation-cap"></i> Education</a></li>
                    <li><a href="experience.html"><i class="fas fa-briefcase"></i> Experience</a></li>
                    <li><a href="projects.html"><i class="fas fa-code"></i> Projects</a></li>
                    <li><a href="publications.html"><i class="fas fa-book"></i> Publications</a></li>
                    <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="theme-toggle-btn" aria-label="Toggle Light/Dark Theme">
                        <i class="fas fa-moon"></i>
                        <i class="fas fa-sun"></i>
                    </button>
                    <a href="resume.html" class="btn btn-secondary active" style="padding: 0.45rem 1rem; border-radius: var(--border-radius-sm); font-size: 0.85rem;">Resume</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Resume Section -->
    <section class="section container" style="padding-top: 7rem; min-height: calc(100vh - 60px);">
        <div style="width: 100%;">
            <div class="resume-frame-card glass-card fade-in">
                <!-- Mock status window toolbar -->
                <div class="resume-toolbar">
                    <div class="resume-toolbar-controls">
                        <div class="window-dot red"></div>
                        <div class="window-dot yellow"></div>
                        <div class="window-dot green"></div>
                    </div>
                    <div class="resume-toolbar-title">
                        <i class="far fa-file-pdf" style="color: #ef4444;"></i> RahulChemitiganti.pdf
                    </div>
                    <div><!-- Empty placeholder for alignment --></div>
                </div>
                
                <!-- PDF iframe frame -->
                <iframe src="RahulChemitiganti.pdf" class="resume-iframe" title="Rahul Chemitiganti Resume"></iframe>
            </div>
        </div>

        <!-- Pulsing Float Download Button -->
        <a href="RahulChemitiganti.pdf" download="RahulChemitiganti.pdf" class="download-btn-pulse fade-in delay-200">
            <i class="fas fa-download"></i> Download Resume
            <div class="pulse-ring"></div>
        </a>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-socials">
                <a href="https://github.com/rahulansharma682" target="_blank" class="footer-social-link" aria-label="GitHub">
